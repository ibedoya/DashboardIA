
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Dashboard Adopción IA - Satrack</title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body {
    margin:0;
    background:#F5F7FB;
    font-family:Segoe UI, Arial;
    color:#1E293B;
}

/* HEADER */
.header {
    background:#F4B400;
    padding:12px 25px;
    display:flex;
    align-items:center;
    gap:16px;
}
.header img { height:40px; }

.container { padding:25px; }

h1 { color:#2E3A8C; margin-bottom:5px; }
.sub { color:#475569; margin-bottom:20px; }

.grid {
    display:grid;
    grid-template-columns:350px 1fr;
    gap:20px;
}

.card {
    background:white;
    border-top:6px solid #2E3A8C;
    border-radius:14px;
    padding:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

label {
    font-size:13px;
    font-weight:600;
    margin-top:10px;
    display:block;
    color:#2E3A8C;
}

select, input {
    width:100%;
    padding:8px;
    margin-top:4px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    background:white;
    color:#1E293B;
    box-sizing:border-box;
}

select[multiple] {
    height:170px;
}

.helper-row {
    display:flex;
    gap:8px;
    margin-top:8px;
}
.helper-row button {
    flex:1;
    padding:8px;
    background:#e2e8f0;
    color:#1E293B;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-weight:600;
}
.helper-row button:hover {
    background:#cbd5e1;
}

button.primary {
    margin-top:15px;
    padding:10px;
    width:100%;
    background:#2E3A8C;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
}
button.primary:hover { background:#1e2b6f; }

.kpi {
    background:#F5F7FB;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    font-size:13px;
    border-left:5px solid #F4B400;
}
.kpi b { font-size:16px; color:#2E3A8C; }

.plot { height:420px; }
.small { height:350px; }

.small-note {
    font-size:12px;
    color:#64748b;
    margin-top:8px;
    line-height:1.3;
}
</style>
</head>
<body>

<div class="header">
    <img src="https://satrack.com/co/wp-content/uploads/sites/2/2022/11/logo_satrack_h.svg" alt="Satrack Logo">
</div>

<div class="container">

<h1>Dashboard de adopción (IA en IDE)</h1>
<div class="sub">Rango: 2026-01-28 → 2026-02-24</div>

<div class="grid">
<div class="card">

<label>Métrica</label>
<select id="metric">
<option value="code_generation_activity_count">Code generation</option>
<option value="code_acceptance_activity_count">Code acceptance</option>
<option value="acceptance_rate">Acceptance rate</option>
<option value="user_initiated_interaction_count">Interacciones usuario</option>
<option value="loc_added_sum">LOC added</option>
</select>

<label>Buscar persona</label>
<input id="userSearch" type="text" placeholder="Escribe para filtrar... (ej: andres, rojas, _satrack)" />

<label>Personas</label>
<select id="users" multiple></select>

<div class="helper-row">
  <button type="button" onclick="selectAllVisible()">Seleccionar visibles</button>
  <button type="button" onclick="clearSelection()">Limpiar</button>
</div>

<div class="small-note">
Tip: escribe en el buscador para filtrar el listado. Luego usa “Seleccionar visibles” para marcar rápido.
</div>

<label>Desde</label>
<input type="date" id="from" value="2026-01-28"/>

<label>Hasta</label>
<input type="date" id="to" value="2026-02-24"/>

<button class="primary" onclick="render()">Actualizar</button>

<div class="kpi">Adopción total: <b id="adopcion"></b></div>
<div class="kpi">Acceptance rate global: <b id="accrate"></b></div>

</div>

<div>
<div class="card">
<div id="bar" class="plot"></div>
</div>
<div class="card" style="margin-top:20px;">
<div id="line" class="small"></div>
</div>
</div>
</div>

</div>

const selUsers = document.getElementById("users");
const searchInput = document.getElementById("userSearch");

// Keep selection state by value
let selectedSet = new Set();

function buildUserOptions(filterText="") {
  const ft = filterText.trim().toLowerCase();
  const currentSelected = new Set(Array.from(selUsers.selectedOptions).map(o=>o.value));
  // merge with memory
  currentSelected.forEach(v=>selectedSet.add(v));

  // rebuild options
  selUsers.innerHTML = "";
  USERS
    .filter(u => !ft || u.toLowerCase().includes(ft))
    .forEach(u => {
      const opt = document.createElement("option");
      opt.value = u;
      opt.text = u;
      opt.selected = selectedSet.has(u) || (selectedSet.size===0); // first load selects all
      selUsers.appendChild(opt);
    });
}

function selectAllVisible() {
  Array.from(selUsers.options).forEach(o => {
    o.selected = true;
    selectedSet.add(o.value);
  });
  render();
}

function clearSelection() {
  Array.from(selUsers.options).forEach(o => o.selected = false);
  selectedSet.clear();
  render();
}

searchInput.addEventListener("input", (e) => {
  buildUserOptions(e.target.value);
});

// Initial: select all
selectedSet = new Set(USERS);
buildUserOptions("");

function getSelectedUsers() {
  const selected = Array.from(selUsers.selectedOptions).map(o=>o.value);
  // keep memory updated
  selectedSet = new Set(selected);
  return selected;
}

function render(){
    const metric = document.getElementById("metric").value;
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;
    const selected = getSelectedUsers();

    const filtered = DATA.filter(r =>
        selected.includes(r.user_login) &&
        r.day >= from && r.day <= to
    );

    const grouped = {};
    filtered.forEach(r=>{
        if(!grouped[r.user_login]) grouped[r.user_login]=0;
        grouped[r.user_login]+= metric==="acceptance_rate"
            ? r.acceptance_rate
            : (r[metric]||0);
    });

    Plotly.newPlot("bar",[{x:Object.keys(grouped),y:Object.values(grouped),type:"bar",
        marker:{color:"#2E3A8C"}}],
        {title:"Vista grupal"});

    const days = [...new Set(filtered.map(r=>r.day))].sort();
    const traces = selected.map(u=>{
        return {
            x:days,
            y:days.map(d=>{
                const r=filtered.find(f=>f.user_login===u && f.day===d);
                return r ? (metric==="acceptance_rate"?r.acceptance_rate:r[metric]) : 0;
            }),
            mode:"lines+markers",
            name:u
        };
    });

    Plotly.newPlot("line",traces,{title:"Vista individual"});

    const active = filtered.filter(r=>r.used_agent || r.used_chat).length;
    document.getElementById("adopcion").innerText =
        filtered.length? ((active/filtered.length)*100).toFixed(1)+"%":"0%";

    const gen = filtered.reduce((a,r)=>a+r.code_generation_activity_count,0);
    const acc = filtered.reduce((a,r)=>a+r.code_acceptance_activity_count,0);
    document.getElementById("accrate").innerText =
        gen? ((acc/gen)*100).toFixed(1)+"%":"0%";
}
